---
name: ⏰ Scheduled Container Scan

on:
  schedule:
    - cron: "0 7 * * 1-5" # Every weekday at 7AM UTC
  workflow_dispatch:

permissions: {}

jobs:
  scheduled-container-scan:
    name: Scheduled Container Scan
    permissions:
      contents: read
    uses: ministryofjustice/analytical-platform-github-actions/.github/workflows/reusable-scheduled-container-scan.yml@fe61ebce4093c531f1cbaa96a01c147b7bf33234 # v8.0.4
    secrets:
      cve-scan-slack-webhook-url: ${{ secrets.ANALYTICAL_PLATFORM_CVE_SCAN_SLACK_WEBHOOK_URL }}
